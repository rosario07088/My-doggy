<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牛馬生存進度計算器</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #333; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .result-box { background: #e7f3ff; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: center; }
        .highlight { font-size: 1.5em; color: #007bff; font-weight: bold; }
        .footer { font-size: 0.8em; color: #888; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🐂🐎 牛馬計算器</h2>
    
    <div class="input-group">
        <label>做牛做馬開始時間</label>
        <input type="time" id="startTime" value="09:00">
    </div>
    
    <div class="input-group">
        <label>牛馬解放時間</label>
        <input type="time" id="endTime" value="21:00">
    </div>
    
    <div class="input-group">
        <label>牛馬酬勞 (時薪)</label>
        <input type="number" id="hourlyRate" value="196">
    </div>

    <div class="input-group">
        <label>想換算的東西 (如：珍珠奶茶)</label>
        <input type="text" id="itemName" value="珍珠奶茶">
    </div>

    <div class="input-group">
        <label>該物品單價</label>
        <input type="number" id="itemPrice" value="60">
    </div>

    <div class="result-box">
        <div id="statusText">目前奮鬥中...</div>
        <div style="margin-top: 10px;">
            已賺到 <span id="itemCount" class="highlight">0</span> <span id="displayItemName">珍珠奶茶</span>
        </div>
        <div style="font-size: 0.9em; margin-top: 5px; color: #666;">
            (總計可領：$<span id="totalPay">0</span>)
        </div>
    </div>

    <div class="footer">每秒更新一次，距離解放更近一步</div>
</div>

<script>
    function updateCalculator() {
        const startTimeStr = document.getElementById('startTime').value;
        const endTimeStr = document.getElementById('endTime').value;
        const hourlyRate = parseFloat(document.getElementById('hourlyRate').value);
        const itemName = document.getElementById('itemName').value;
        const itemPrice = parseFloat(document.getElementById('itemPrice').value);
        
        document.getElementById('displayItemName').innerText = itemName;

        const now = new Date();
        const start = new Date();
        const end = new Date();

        const [sH, sM] = startTimeStr.split(':');
        const [eH, eM] = endTimeStr.split(':');

        start.setHours(sH, sM, 0);
        end.setHours(eH, eM, 0);

        // 處理跨夜情況
        if (end < start) end.setDate(end.getDate() + 1);

        let totalSeconds = (end - start) / 1000;
        let elapsedSeconds = (now - start) / 1000;

        if (elapsedSeconds < 0) {
            document.getElementById('statusText').innerText = "尚未開始上班";
            elapsedSeconds = 0;
        } else if (elapsedSeconds > totalSeconds) {
            document.getElementById('statusText').innerText = "🎉 恭喜解放！";
            elapsedSeconds = totalSeconds;
        } else {
            document.getElementById('statusText').innerText = "⚒️ 正在努力拉磨中...";
        }

        const currentEarned = (elapsedSeconds / 3600) * hourlyRate;
        const totalPay = (totalSeconds / 3600) * hourlyRate;
        const items = (currentEarned / itemPrice).toFixed(2);

        document.getElementById('itemCount').innerText = items;
        document.getElementById('totalPay').innerText = Math.floor(totalPay);
    }

    setInterval(updateCalculator, 1000);
    updateCalculator();
</script>

</body>
</html>
