<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tell My Doggy</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f4f7;
            --primary-blue: #a3bacf;
            --accent-gray: #8e9aaf;
            --heart-red: #ffb7b2;
            --card-bg: #ffffff;
            --text-color: #5a6772;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .header { text-align: center; padding: 20px 0 10px; }
        .paw-print { font-size: 24px; color: var(--primary-blue); }

        .nav-tabs { display: flex; width: 100%; max-width: 400px; background: white; position: sticky; top: 0; z-index: 10; }
        .tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; border-bottom: 3px solid transparent; font-size: 14px; }
        .tab.active { border-bottom: 3px solid var(--primary-blue); font-weight: bold; color: var(--primary-blue); }

        .view-section { width: 100%; max-width: 400px; padding: 15px; box-sizing: border-box; }
        
        .calendar-container { background: var(--card-bg); border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .month-selector { margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; }
        select { padding: 8px 12px; border-radius: 12px; border: 1px solid var(--primary-blue); background: white; font-size: 14px; color: var(--text-color); }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 14px; cursor: pointer; position: relative; }
        .day.has-content::after { content: '❤️'; font-size: 8px; position: absolute; bottom: 2px; }
        .day.today { background-color: var(--primary-blue); color: white; }

        #card-view {
            display: none; width: 100vw; height: calc(100vh - 150px);
            overflow-x: auto; scroll-snap-type: x mandatory;
            white-space: nowrap; -webkit-overflow-scrolling: touch;
        }
        .flip-card {
            display: inline-block; width: 85vw; height: 90%;
            margin: 20px 7.5vw; background: white; border-radius: 25px;
            vertical-align: top; white-space: normal; scroll-snap-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); padding: 25px; 
            box-sizing: border-box; overflow-y: auto; border: 1px solid #eee;
        }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; width: 90%; max-height: 85vh; border-radius: 25px; padding: 25px; overflow-y: auto; box-sizing: border-box; }
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--primary-blue); font-size: 14px; }
        textarea, input { width: 100%; border: 1px solid #eef2f6; border-radius: 12px; padding: 12px; margin-top: 5px; box-sizing: border-box; background: #fcfdfe; font-size: 15px; }
        
        .btn { background: var(--primary-blue); color: white; border: none; padding: 14px; border-radius: 20px; width: 100%; font-size: 16px; margin-top: 20px; font-weight: bold; }
        .secondary-btn { background: none; color: var(--accent-gray); border: 1px solid var(--accent-gray); margin-top: 10px; font-size: 12px; padding: 10px; border-radius: 15px; width: 100%; cursor: pointer; }

        .vocab-tag { display: inline-block; background: #fff5f5; color: #ff8a8a; padding: 6px 14px; border-radius: 12px; font-size: 13px; margin-top: 15px; border: 1px solid #ffe3e3; width: 100%; box-sizing: border-box; }
        .card-photo { width: 100%; border-radius: 15px; margin-bottom: 15px; object-fit: cover; max-height: 250px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="paw-print">🐾 🐾</div>
        <h2 style="color: var(--primary-blue); margin: 0; font-size: 20px;">Tell My Doggy</h2>
    </div>

    <div class="nav-tabs">
        <div class="tab active" id="tab-cal" onclick="showView('cal')">月曆回顧</div>
        <div class="tab" id="tab-card" onclick="showView('card')">卡片滑動模式</div>
    </div>

    <div id="cal-section" class="view-section">
        <div class="month-selector">
            <select id="yearSel" onchange="updateMonthOptions()"></select>
            <select id="monthSel" onchange="initCalendar()"></select>
        </div>
        <div class="calendar-container">
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        
        <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
            <button class="secondary-btn" onclick="exportData()">📤 匯出備份 (防紀錄不見)</button>
            <button class="secondary-btn" onclick="document.getElementById('importFile').click()">📥 匯入/還原紀錄</button>
            <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(this)">
        </div>
    </div>

    <div id="card-view"></div>

    <div id="editorModal" class="modal">
        <div class="modal-content">
            <h3 id="selectedDateText" style="color: var(--primary-blue); margin: 0 0 15px 0;">日期</h3>
            
            <label>🎵 每日金曲</label>
            <input type="text" id="music" placeholder="今天的主題曲...">
            
            <label>📷 上傳照片</label>
            <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(this)">
            <div id="photoPreview"></div>

            <label>🍡 三個感恩</label>
            <textarea id="gratitude" rows="3"></textarea>
            
            <label>🍀 三個完成</label>
            <textarea id="done" rows="3"></textarea>
            
            <label>✨ 三個高光時刻</label>
            <textarea id="highlight" rows="3"></textarea>

            <button class="btn" onclick="saveData()">儲存美好時刻 ✨</button>
            <button class="btn" style="background:#eee; color:#999; margin-top:10px;" onclick="closeModal()">關閉</button>
        </div>
    </div>

    <script>
        let currentData = JSON.parse(localStorage.getItem('doggyDiaryV4')) || {};
        let editingDate = '';
        let tempPhoto = '';

        const vocabs = [
            {en: "Serendipity", kk: "/ˌserənˈdipədē/", ch: "不期而遇的美好"},
            {en: "Luminous", kk: "/ˈlo͞omənəs/", ch: "發光的 / 明亮的"},
            {en: "Brave", kk: "/brāv/", ch: "勇敢的"},
            {en: "Cherish", kk: "/ˈtʃer.ɪʃ/", ch: "珍愛 / 珍惜"},
            {en: "Euphoria", kk: "/juːˈfɔːr.i.ə/", ch: "極度愉快"},
            {en: "Bloom", kk: "/bluːm/", ch: "盛開"},
            {en: "Comfort", kk: "/ˈkʌm.fət/", ch: "安慰 / 舒適"},
            {en: "Vibrant", kk: "/ˈvaɪ.brənt/", ch: "充滿活力的"}
        ];

        function initSelectors() {
            const yearSel = document.getElementById('yearSel');
            const currentYear = new Date().getFullYear();
            yearSel.add(new Option("2026年", 2026));
            yearSel.add(new Option("2027年", 2027));
            yearSel.value = 2026;
            updateMonthOptions();
        }

        function updateMonthOptions() {
            const year = document.getElementById('yearSel').value;
            const monthSel = document.getElementById('monthSel');
            monthSel.innerHTML = '';
            
            // 2026年從3月開始，2027年從1月開始
            const startMonth = (year == "2026") ? 2 : 0; 
            for(let m = startMonth; m < 12; m++) {
                monthSel.add(new Option((m + 1) + '月', m));
            }
            initCalendar();
        }

        function initCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            const y = document.getElementById('yearSel').value;
            const m = document.getElementById('monthSel').value;
            const daysInMonth = new Date(y, parseInt(m)+1, 0).getDate();
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${y}-${parseInt(m)+1}-${i}`;
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                if (currentData[dateStr]) dayEl.classList.add('has-content');
                
                const today = new Date();
                if (i === today.getDate() && m == today.getMonth() && y == today.getFullYear()) {
                    dayEl.classList.add('today');
                }
                
                dayEl.innerText = i;
                dayEl.onclick = () => openEditor(dateStr);
                grid.appendChild(dayEl);
            }
        }

        function handlePhoto(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                tempPhoto = reader.result;
                document.getElementById('photoPreview').innerHTML = `<img src="${tempPhoto}" style="width:100%; border-radius:12px; margin-top:10px;">`;
            };
            if (file) reader.readAsDataURL(file);
        }

        function openEditor(date) {
            editingDate = date;
            document.getElementById('selectedDateText').innerText = date;
            const saved = currentData[date] || {};
            document.getElementById('music').value = saved.music || '';
            document.getElementById('gratitude').value = saved.gratitude || '';
            document.getElementById('done').value = saved.done || '';
            document.getElementById('highlight').value = saved.highlight || '';
            document.getElementById('photoPreview').innerHTML = saved.photo ? `<img src="${saved.photo}" style="width:100%; border-radius:12px; margin-top:10px;">` : '';
            tempPhoto = saved.photo || '';
            document.getElementById('editorModal').style.display = 'flex';
        }

        function saveData() {
            let vocabObj = currentData[editingDate]?.vocabObj;
            if (!vocabObj) {
                vocabObj = vocabs[Math.floor(Math.random() * vocabs.length)];
            }

            currentData[editingDate] = {
                music: document.getElementById('music').value,
                gratitude: document.getElementById('gratitude').value,
                done: document.getElementById('done').value,
                highlight: document.getElementById('highlight').value,
                photo: tempPhoto,
                vocabObj: vocabObj
            };
            localStorage.setItem('doggyDiaryV4', JSON.stringify(currentData));
            initCalendar();
            renderCards();
            alert(`儲存成功！🐾\n今日單字：${vocabObj.en} ${vocabObj.kk}`);
            closeModal();
        }

        function renderCards() {
            const container = document.getElementById('card-view');
            container.innerHTML = '';
            const sortedDates = Object.keys(currentData).sort((a,b) => new Date(b) - new Date(a));
            
            if(sortedDates.length === 0) {
                container.innerHTML = "<div class='flip-card'><h3>目前還沒有日記喔</h3><p>回到月曆點擊日期開始寫吧！🐾</p></div>";
                return;
            }

            sortedDates.forEach(date => {
                const d = currentData[date];
                const card = document.createElement('div');
                card.className = 'flip-card';
                card.innerHTML = `
                    <div style="font-size:12px; color:var(--accent-gray)">${date}</div>
                    <h3 style="margin: 5px 0 15px 0; color:var(--primary-blue)">Tell My Doggy 🐾</h3>
                    ${d.photo ? `<img src="${d.photo}" class="card-photo">` : ''}
                    <p style="font-size:14px"><strong>🎵 金曲：</strong>${d.music || '無'}</p>
                    <div style="margin-bottom:15px">
                        <p><strong>🍡 感恩</strong><br><small>${d.gratitude.replace(/\n/g, '<br>')}</small></p>
                        <p><strong>🍀 完成</strong><br><small>${d.done.replace(/\n/g, '<br>')}</small></p>
                        <p><strong>✨ 高光</strong><br><small>${d.highlight.replace(/\n/g, '<br>')}</small></p>
                    </div>
                    <div class="vocab-tag">
                        📖 學習：<strong>${d.vocabObj.en}</strong> <span style="font-size:11px; color:#aaa">${d.vocabObj.kk}</span><br>
                        <small>意思：${d.vocabObj.ch}</small>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function showView(type) {
            document.getElementById('cal-section').style.display = type === 'cal' ? 'block' : 'none';
            document.getElementById('card-view').style.display = type === 'card' ? 'flex' : 'none';
            document.getElementById('tab-cal').className = type === 'cal' ? 'tab active' : 'tab';
            document.getElementById('tab-card').className = type === 'card' ? 'tab active' : 'tab';
            if(type === 'card') renderCards();
        }

        function closeModal() { document.getElementById('editorModal').style.display = 'none'; }

        function exportData() {
            const dataStr = JSON.stringify(currentData, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `Doggy-Backup-${new Date().toLocaleDateString()}.json`;
            a.click();
        }

        function importData(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    currentData = {...currentData, ...importedData};
                    localStorage.setItem('doggyDiaryV4', JSON.stringify(currentData));
                    initCalendar();
                    alert("資料已成功還原！🐾");
                } catch (err) {
                    alert("匯入失敗，請確認檔案格式是否正確。");
                }
            };
            if (file) reader.readAsText(file);
        }

        initSelectors();
    </script>
</body>
</html>
