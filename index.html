<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心靈臘腸手帳</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f4f7;
            --primary-blue: #a3bacf; /* 莫蘭迪粉藍 */
            --accent-gray: #8e9aaf;
            --heart-red: #ffb7b2;
            --card-bg: #ffffff;
            --text-color: #5a6772;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 標題與插圖 */
        .header { text-align: center; margin-bottom: 20px; }
        .dachshund { font-size: 40px; }

        /* 月曆樣式 */
        .calendar-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 350px;
            margin-bottom: 20px;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-blue);
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        .day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
        }
        .day.has-content::after {
            content: '❤️';
            font-size: 8px;
            position: absolute;
            bottom: 2px;
        }
        .day.today { background-color: var(--primary-blue); color: white; }

        /* 編輯彈窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--card-bg);
            width: 85%;
            max-height: 80vh;
            border-radius: 25px;
            padding: 20px;
            overflow-y: auto;
        }
        input, textarea {
            width: 100%;
            border: 1px solid #e0e6ed;
            border-radius: 10px;
            padding: 10px;
            margin: 5px 0 15px;
            box-sizing: border-box;
            background: #fdfdfd;
        }
        .btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            width: 100%;
            font-size: 16px;
        }

        /* 卡片模式 */
        #card-view {
            display: none;
            width: 100%;
            max-width: 350px;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 0;
        }
        .flip-card {
            display: inline-block;
            width: 280px;
            background: white;
            margin-right: 15px;
            padding: 20px;
            border-radius: 20px;
            vertical-align: top;
            white-space: normal;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid var(--primary-blue);
        }

        .export-btn {
            margin-top: 20px;
            background: var(--accent-gray);
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="dachshund">🐕💨</div>
        <h2 style="color: var(--primary-blue); margin: 5px;">心靈臘腸手帳</h2>
    </div>

    <div id="calendar-view" class="calendar-container">
        <div class="calendar-header">
            <span id="monthDisplay">2026年3月</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <button class="btn" onclick="toggleView()">切換卡片模式 / 月曆</button>
    
    <div id="card-view"></div>

    <button class="btn export-btn" onclick="exportData()">匯出本月數據 (給 Gemini)</button>

    <div id="editorModal" class="modal">
        <div class="modal-content">
            <h3 id="selectedDateText" style="color: var(--primary-blue);">日期</h3>
            <label>🎵 每日金曲</label>
            <input type="text" id="music" placeholder="今天的主題曲是？">
            
            <label>🙏 三個感恩</label>
            <textarea id="gratitude" rows="3" placeholder="1. ...&#10;2. ...&#10;3. ..."></textarea>
            
            <label>✅ 三個完成</label>
            <textarea id="done" rows="3" placeholder="完成了什麼大事呢？"></textarea>
            
            <label>✨ 三個高光時刻</label>
            <textarea id="highlight" rows="3" placeholder="今天最閃耀的瞬間..."></textarea>
            
            <button class="btn" onclick="saveData()">儲存今日美好 🐾</button>
            <button class="btn" style="background:#ccc; margin-top:10px;" onclick="closeModal()">關閉</button>
        </div>
    </div>

    <script>
        let currentData = JSON.parse(localStorage.getItem('sausageDiary')) || {};
        let editingDate = '';

        function initCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            
            document.getElementById('monthDisplay').innerText = `${now.getFullYear()}年 ${now.getMonth() + 1}月`;

            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${now.getFullYear()}-${now.getMonth() + 1}-${i}`;
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                if (currentData[dateStr]) dayEl.classList.add('has-content');
                if (i === now.getDate()) dayEl.classList.add('today');
                
                dayEl.innerText = i;
                dayEl.onclick = () => openEditor(dateStr);
                grid.appendChild(dayEl);
            }
        }

        function openEditor(date) {
            editingDate = date;
            document.getElementById('selectedDateText').innerText = date;
            const saved = currentData[date] || {};
            document.getElementById('music').value = saved.music || '';
            document.getElementById('gratitude').value = saved.gratitude || '';
            document.getElementById('done').value = saved.done || '';
            document.getElementById('highlight').value = saved.highlight || '';
            document.getElementById('editorModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editorModal').style.display = 'none';
        }

        function saveData() {
            currentData[editingDate] = {
                music: document.getElementById('music').value,
                gratitude: document.getElementById('gratitude').value,
                done: document.getElementById('done').value,
                highlight: document.getElementById('highlight').value
            };
            localStorage.setItem('sausageDiary', JSON.stringify(currentData));
            initCalendar();
            renderCards();
            closeModal();
        }

        function renderCards() {
            const container = document.getElementById('card-view');
            container.innerHTML = '';
            const sortedDates = Object.keys(currentData).sort().reverse();
            
            sortedDates.forEach(date => {
                const d = currentData[date];
                const card = document.createElement('div');
                card.className = 'flip-card';
                card.innerHTML = `
                    <h4 style="color:var(--primary-blue)">📅 ${date}</h4>
                    <p><strong>🎵 金曲：</strong>${d.music}</p>
                    <p><strong>🙏 感恩：</strong><br>${d.gratitude.replace(/\n/g, '<br>')}</p>
                    <p><strong>✅ 完成：</strong><br>${d.done.replace(/\n/g, '<br>')}</p>
                    <p><strong>✨ 高光：</strong><br>${d.highlight.replace(/\n/g, '<br>')}</p>
                    <p style="text-align:right">🐕~🐾</p>
                `;
                container.appendChild(card);
            });
        }

        function toggleView() {
            const cal = document.getElementById('calendar-view');
            const card = document.getElementById('card-view');
            if (cal.style.display === 'none') {
                cal.style.display = 'block';
                card.style.display = 'none';
            } else {
                cal.style.display = 'flex';
                card.style.display = 'block';
                renderCards();
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(currentData, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `my-monthly-report.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        initCalendar();
    </script>
</body>
</html>
